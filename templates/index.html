<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>GəncBakı</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>GəncBakı — Fürsətlər</h1>
    <a href="/add" class="add-link">+ Yeni fürsət əlavə et</a>

    <div class="grid">
    {% for item in opportunities %}
        <div class="card">
            {% if item.image_filename %}
            <img src="{{ url_for('static', filename='uploads/' + item.image_filename) }}" class="card-img">
            {% endif %}
            <span class="tag">{{ item.category }}</span>
            <h3>{{ item.title }}</h3>
            <p>{{ item.description }}</p>
            <p>Son tarix: {{ item.deadline }}</p>
            <a href="{{ url_for('delete_opportunity', opportunity_id=item.id) }}" class="delete-btn">Sil</a>
        </div>
    {% endfor %}
    </div>
</body>
</html>
